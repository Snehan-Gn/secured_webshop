<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Shop - Administration</title>
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body>
    <div id="topbar"></div>

    <main>
      <section class="hero">
        <div class="container">
          <h1>Administration</h1>
          <p class="hero-text">Gestion des utilisateurs</p>
        </div>
      </section>

      <section class="admin-section">
        <div class="container">
          <h2>Liste des utilisateurs</h2>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Nom</th>
                <th>Email</th>
                <th>Rôle</th>
                <th>Adresse</th>
              </tr>
            </thead>
            <tbody id="user-table-body">
              <tr>
                <td colspan="5">Chargement...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <footer id="contact" class="footer">
      <div class="container">
        <p>Projet pédagogique - ETML 183</p>
      </div>
    </footer>

    <script src="/js/nav.js"></script>
    <script>
      const token = localStorage.getItem("token");
      const tbody = document.getElementById("user-table-body");

      if (!token) {
        tbody.innerHTML = '<tr><td colspan="5" style="color:red">Erreur : Vous devez être connecté pour accéder à cette page.</td></tr>';
      } else {
        fetch("/api/admin", {
          headers: {
            "Authorization": "Bearer " + token,
          },
        })
          .then((r) => {
            if (r.status === 403) throw new Error("Accès refusé : Droits insuffisants");
            if (!r.ok) throw new Error("Erreur lors de la récupération des données");
            return r.json();
          })
          .then((users) => {
            tbody.innerHTML = users
              .map(
                (u) => `
              <tr>
                  <td>${u.id}</td>
                  <td>${u.username}</td>
                  <td>${u.email}</td>
                  <td><strong>${u.role}</strong></td>
                  <td>${u.address || "-"}</td>
              </tr>
          `,
              )
              .join("");
          })
          .catch((err) => {
            tbody.innerHTML =
              `<tr><td colspan="5" style="color:red">Erreur : ${err.message}</td></tr>`;
          });
      }
    </script>
  </body>
</html>
