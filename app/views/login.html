<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Shop - Connexion</title>
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body>
    <div id="topbar"></div>

    <main>
      <section class="hero">
        <div class="container">
          <h1>Connexion</h1>
          <form action="/api/auth/login" method="post">
            Email:<br />
            <input
              type="email"
              name="email"
              placeholder="Email"
              required
            /><br /><br />

            Mot de passe:<br />
            <input
              type="password"
              name="password"
              placeholder="Password"
              required
            /><br /><br />

            <input type="submit" value="login" />
          </form>
        </div>
      </section>
    </main>

    <footer id="contact" class="footer">
      <div class="container">
        <p>Projet pedagogique - ETML 183</p>
      </div>
    </footer>

    <script src="/js/nav.js"></script>
  </body>
</html>
