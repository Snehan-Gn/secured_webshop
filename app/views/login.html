<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Shop - Connexion</title>
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body>
    <div id="topbar"></div>

    <main>
      <section class="hero">
        <div class="container">
          <h1>Connexion</h1>
          <form id="loginForm">
            Email:<br />
            <input type="email" id="email" placeholder="Email" required /><br /><br />

            Mot de passe:<br />
            <input type="password" id="password" placeholder="Password" required /><br /><br />

            <input type="submit" value="Se connecter" class="cta" />
          </form>
          <p id="error-message" style="color: red; margin-top: 10px;"></p>
        </div>
      </section>
    </main>

    <footer id="contact" class="footer">
      <div class="container">
        <p>Projet pedagogique - ETML 183</p>
      </div>
    </footer>

    <script src="/js/nav.js"></script>
    <script>
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault(); // Empêche le rechargement de la page
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-message');

        try {
          const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });

          const data = await response.json();

          if (response.ok) {
            localStorage.setItem('token', data.token);
            
            if (data.user.role === 'admin') {
              window.location.href = '/admin';
            } else {
              window.location.href = '/profile';
            }
          } else {
            errorMsg.innerText = data.error || "Identifiants incorrects";
          }
        } catch (err) {
          errorMsg.innerText = "Erreur de connexion au serveur";
        }
      });
    </script>
  </body>
</html>
