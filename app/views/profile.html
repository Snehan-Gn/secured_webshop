<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Secure Shop - Mon Profil</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <div id="topbar"></div>
    <main>
        <section class="hero"><div class="container"><h1>Mon Profil</h1></div></section>
        <div class="container">
            <div class="profile-card">
                <div id="photo-container"><div class="profile-photo-placeholder">👤</div></div>
                <div id="user-info">
                    <div class="info-row"><strong>Nom :</strong> <span id="username">...</span></div>
                    <div class="info-row"><strong>Email :</strong> <span id="email">...</span></div>
                    <div class="info-row"><strong>Rôle :</strong> <span id="role">...</span></div>
                </div>
                <hr>
                <div id="status-message" style="display:none; padding: 10px; margin: 10px 0; border-radius: 4px;"></div>
                <form id="address-form">
                    <div class="form-group"><label>Adresse</label><input type="text" id="address" placeholder="Votre adresse complète"></div>
                    <button type="submit" class="cta">Mettre à jour l'adresse</button>
                </form>
            </div>
        </div>
    </main>
    <script src="/js/nav.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const statusMsg = document.getElementById('status-message');

        function showStatus(text, isError = false) {
            statusMsg.innerText = text;
            statusMsg.style.display = 'block';
            statusMsg.style.backgroundColor = isError ? '#f8d7da' : '#d4edda';
            statusMsg.style.color = isError ? '#721c24' : '#155724';
        }

        async function loadProfile() {
            if (!token) {
                showStatus("Connectez-vous pour voir votre profil", true);
                return;
            }
            try {
                const res = await fetch('/api/profile', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const user = await res.json();
                if (res.ok) {
                    document.getElementById('username').textContent = user.username;
                    document.getElementById('email').textContent = user.email;
                    document.getElementById('role').textContent = user.role;
                    document.getElementById('address').value = user.address || '';
                } else {
                    showStatus("Session expirée ou invalide", true);
                }
            } catch (err) { showStatus("Erreur de connexion HTTPS", true); }
        }

        document.getElementById('address-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const res = await fetch('/api/profile', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token 
                },
                body: JSON.stringify({ address: document.getElementById('address').value })
            });
            if (res.ok) showStatus('Adresse mise à jour !');
            else showStatus('Erreur lors de la mise à jour', true);
        });

        loadProfile();
    </script>
</body>
</html>
