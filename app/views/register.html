<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Shop - Inscription</title>
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body>
    <div id="topbar"></div>
    <main>
      <section class="hero">
        <div class="container">
          <h1>Inscription</h1>
          <form id="registerForm">
            <div class="form-group">
              <label>Nom complet :</label><br />
              <input type="text" id="name" placeholder="Votre nom" required />
            </div><br />
            <div class="form-group">
              <label>Email :</label><br />
              <input type="email" id="email" placeholder="votre@email.com" required />
            </div><br />
            <div class="form-group">
              <label>Mot de passe :</label><br />
              <input type="password" id="password" placeholder="Mot de passe" required />
            </div><br />
            <div class="form-group">
              <label>Adresse :</label><br />
              <textarea id="address" placeholder="Votre adresse complète" required style="width: 100%; border-radius: 4px; border: 1px solid #ddd; padding: 10px;"></textarea>
            </div><br />
            <input type="submit" value="Créer mon compte" class="cta" />
          </form>
          <p style="margin-top: 20px">Déjà un compte ? <a href="/login">Connectez-vous ici</a></p>
          <p id="message" style="margin-top: 10px; font-weight: bold;"></p>
        </div>
      </section>
    </main>
    <footer class="footer"><div class="container"><p>Projet pedagogique - ETML 183</p></div></footer>
    <script src="/js/nav.js"></script>
    <script>
      document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault(); 
        localStorage.clear();
        const message = document.getElementById('message');
        const formData = {
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
          address: document.getElementById('address').value, 
          role: 'user' 
        };

        try {
          const response = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
          });

          const data = await response.json();
          if (response.ok) {
            message.style.color = "green";
            message.innerText = "Compte créé ! Redirection...";
            setTimeout(() => { window.location.href = '/login'; }, 2000);
          } else {
            message.style.color = "red";
            message.innerText = data.error || "Erreur lors de l'inscription";
          }
        } catch (err) {
          message.style.color = "red";
          message.innerText = "Erreur serveur (vérifiez que le serveur HTTPS tourne)";
        }
      });
    </script>
  </body>
</html>
